name: hb_mamba
# NOTE: Do NOT use `conda env create -f env.yml` for a full install.
# mamba-ssm and causal-conv1d must be built from source manually.
# See MAMBA2_INSTALL.txt for the complete step-by-step guide.

channels:
  - nvidia
  - defaults

dependencies:
  # Python
  - python=3.10

  # CUDA toolkit — matches system nvcc 12.9
  - nvidia::cuda-toolkit

  # pip-installed packages
  - pip
  - pip:
      # PyTorch — cu124 wheels are compatible with CUDA 12.x systems
      - torch==2.6.0+cu124
      - torchvision==0.21.0+cu124
      - torchaudio==2.6.0+cu124

      # Mamba SSM — MUST be installed manually from source (see MAMBA2_INSTALL.txt)
      # mamba-ssm==2.2.6.post3  (build from source: github.com/state-spaces/mamba)
      # causal-conv1d==1.6.1    (build from source: github.com/Dao-AILab/causal-conv1d)

      # transformers — pin <5.0 (5.x removed symbols mamba-ssm depends on)
      - transformers>=4.40,<5.0

      # Training orchestration
      - accelerate>=0.25
      - wandb>=0.16

      # Core scientific stack
      - numpy>=1.24
      - pandas>=2.0
      - scikit-learn>=1.3
      - scipy>=1.11

      # Geospatial (AIS grid processing)
      - geopandas>=0.14
      - shapely>=2.0

      # Data I/O
      - h5py>=3.9
      - pyyaml>=6.0

      # Tensor manipulation
      - einops>=0.7

      # Utilities
      - tqdm>=4.66
      - rich>=13.0
      - matplotlib>=3.8
      - seaborn>=0.13

      # Logging
      - tensorboard>=2.15
