name: hb-mamba
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10

  # PyTorch (CUDA 12.1 — matches Ada architecture GPUs)
  - pytorch=2.2.0
  - torchvision=0.17.0
  - torchaudio=2.2.0
  - pytorch-cuda=12.1

  # Core scientific stack
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - scipy>=1.11

  # Geospatial (AIS grid processing)
  - geopandas>=0.14
  - shapely>=2.0

  # Data I/O
  - h5py>=3.9
  - pyyaml>=6.0

  # Utilities
  - tqdm>=4.66
  - matplotlib>=3.8      # loss curve plots, spatial visualisation
  - seaborn>=0.13        # heatmaps for attention/confusion

  # pip-only packages
  - pip
  - pip:
      # Mamba SSM (requires CUDA build)
      - mamba-ssm>=1.2.0
      - causal-conv1d>=1.1.0

      # Training orchestration
      - accelerate>=0.25
      - wandb>=0.16

      # Tensor manipulation
      - einops>=0.7

      # Optional but recommended
      - tensorboard>=2.15     # fallback logging
      - rich>=13.0            # pretty console output